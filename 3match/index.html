<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Match 3 Playable Ad</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div id="app">
    <!-- HUD / Objectives -->
    <div id="hud">
    </div>

    <!-- Physics Simulation Area -->
    <div id="physics-container"></div>

    <!-- Game Board Container -->
    <div id="board-container">
      <div id="game-board"></div>
    </div>

    <!-- Tutorial Overlay (Hand animation) -->
    <div id="tutorial-overlay" class="hidden">
      <div id="tutorial-hand"></div>
    </div>

    <!-- End Card / Call to Action -->
    <div id="end-card" class="hidden">
      <h1 id="end-card-title">Great Job!</h1>
      <button id="cta-button">PLAY NOW</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
